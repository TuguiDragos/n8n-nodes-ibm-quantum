name: Publish to npm

on:
  release:
    types: [created]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
          cache: npm
      - run: npm ci --ignore-scripts
      - name: Verify package version matches the release tag
        if: github.event_name == 'release'
        run: |
          PKG=$(node -p "require('./package.json').version")
          TAG=${GITHUB_REF_NAME#v}
          if [ "$PKG" != "$TAG" ]; then
            echo "package.json version ($PKG) does not match the release tag ($TAG)"
            exit 1
          fi
      # Authentication uses the npm trusted publisher (OIDC), so no long-lived token is needed.
      # prepublishOnly runs build, lint and test before the package is published.
      - run: npm publish --provenance --access public
