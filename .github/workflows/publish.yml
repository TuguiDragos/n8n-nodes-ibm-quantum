name: Publish to npm

on:
  release:
    types: [created]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
          cache: npm
      - run: npm ci --ignore-scripts
      - name: Verify package version matches the release tag
        if: github.event_name == 'release'
        run: |
          PKG=$(node -p "require('./package.json').version")
          TAG=${GITHUB_REF_NAME#v}
          if [ "$PKG" != "$TAG" ]; then
            echo "package.json version ($PKG) does not match the release tag ($TAG)"
            exit 1
          fi
      # Auth uses an npm automation token; provenance still works because the repo is public
      # and the job has id-token: write. prepublishOnly runs build, lint and test first.
      - run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
