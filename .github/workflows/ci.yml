name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: ['20', '22', '24']
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
      # isolated-vm is a native transitive dev dependency that is not needed to lint, build
      # or test, so skip install scripts to keep the matrix green on every Node version.
      - run: npm ci --ignore-scripts
      - run: npm run lint
      - run: npm run build
      - run: npm test
